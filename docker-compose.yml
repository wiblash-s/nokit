services:
  defuse:
    image: ghcr.io/wiblash-s/nokit:latest
    container_name: defuse
    restart: unless-stopped
    ports:
      - "8080:8080"
      # UDP log sink: CS2 sends its logs here via `logaddress_add`.
      - "27500:27500/udp"
    environment:
      PANEL_PASSWORD: ${PANEL_PASSWORD}
      RCON_PASSWORD: ${RCON_PASSWORD}
      CONFIG_PATH: /etc/defuse/config.yaml
      DB_PATH: /data/nokit.db
      # ---- Live Logs (UDP ingestion) ----
      # UDP port the panel binds to receive CS2 logs. Must match the port
      # published above and the port in CS2_LOG_SINK_ADDR.
      CS2_LOG_LISTEN_PORT: ${CS2_LOG_LISTEN_PORT:-27500}
      # Address the CS2 server should send its logs to, as reachable *from the
      # CS2 container*. In this single-stack setup that's the defuse service
      # name on the shared Docker network. The panel issues
      # `logaddress_add <addr>; log on` over RCON on startup.
      CS2_LOG_SINK_ADDR: ${CS2_LOG_SINK_ADDR:-defuse:27500}
      # ---- Live Logs (HTTP ingestion) ----
      # Full URL of the panel's HTTP log endpoint (`POST /api/logs/http`) as
      # reachable from the CS2 container. When set, the panel registers it via
      # `logaddress_add_http <url>` over RCON on startup, so servers that use
      # CS2's HTTP log delivery feed into the same Live Logs pipeline as UDP.
      CS2_LOG_HTTP_SINK_URL: ${CS2_LOG_HTTP_SINK_URL:-http://defuse:8080/api/logs/http}
      # Optional shared secret guarding the HTTP log endpoint (empty = open).
      CS2_LOG_HTTP_TOKEN: ${CS2_LOG_HTTP_TOKEN:-}
      # ---- Workshop maps: Mode B (filesystem scan, opt-in) ----
      # Base dir the panel looks under for per-server workshop mounts. It expects
      # a subdir named after each server's ID: /workshop/<serverId>. Default is
      # /workshop; uncomment to override. A single server can also be pointed at
      # an arbitrary path with WORKSHOP_PATH_<UPPER_ID> (server ID uppercased,
      # hyphens -> underscores, e.g. WORKSHOP_PATH_KATZENSTUBE).
      # WORKSHOP_BASE: /workshop
    volumes:
      - ./config.yaml:/etc/defuse/config.yaml:ro
      - nokit_data:/data
      # ---- Workshop maps: Mode B (filesystem scan, opt-in) ----
      # Mount your CS2 server's steamapps/workshop/content/730 directory at
      # /workshop/<serverId> to enable exact ID<->name mapping, multi-version
      # detection, and (when mounted read-write) uninstall. <serverId> is the
      # slug shown in the panel URL. Leave it read-only (:ro) to keep uninstall
      # disabled; the panel auto-detects writability with a runtime write-probe.
      # For the bundled cs2 service below, the workshop content lives under its
      # cs2_data volume; adjust the host path to match your setup:
      # - /path/to/cs2/steamapps/workshop/content/730:/workshop/katzenstube:ro
    networks:
      - cs2net

  # Example CS2 dedicated server (joedwards32/cs2). Remove this block if you
  # run your CS2 server elsewhere — just point CS2_LOG_SINK_ADDR at the panel.
  cs2:
    image: joedwards32/cs2
    container_name: cs2
    restart: unless-stopped
    ports:
      - "27015:27015/tcp"
      - "27015:27015/udp"
    environment:
      STEAMAPPVALIDATE: 0
      CS2_SERVERNAME: "nokit-managed"
      CS2_RCON_PORT: 27015
      CS2_RCONPW: ${RCON_PASSWORD}
      CS2_PW: ""
      CS2_PORT: 27015
      CS2_GAMEALIAS: competitive
      SRCDS_TOKEN: ${STEAM_GSLT}
      # Enable logging so `logaddress_add` (set by the panel over RCON) works.
      CS2_LOG: "on"
      CS2_LOG_DETAIL: 3
    volumes:
      - cs2_data:/home/steam/cs2-dedicated/
    networks:
      - cs2net

networks:
  cs2net:
    driver: bridge

volumes:
  nokit_data:
  cs2_data:
